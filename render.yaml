services:
  - type: web
    name: chitz-backend
    runtime: node
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_USER
        sync: false
      - key: MONGO_PASS
        sync: false
      - key: MONGO_HOST
        sync: false
      - key: MONGO_DB
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: SMTP_ENABLED
        value: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: IMAGE_MODERATION_ENABLED
        value: true
      - key: IMAGE_MODERATION_SERVICE_URL
        sync: false
      - key: IMAGE_MODERATION_API_KEY
        sync: false
      - key: IMAGE_MODERATION_TIMEOUT_MS
        value: 4500
      - key: IMAGE_MODERATION_FAIL_OPEN
        value: false
      - key: IMAGE_MODERATION_THRESHOLD
        value: 0.72
      - key: IMAGE_MODERATION_BLOCKED_LABELS
        value: adult,nsfw,porn,hentai,nudity,sexual,sexy,violence,blood,gore,graphic,weapon,harassment,abuse,hate
    healthCheckPath: /api/health
